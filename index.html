<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Doc Reader">
  <meta name="theme-color" content="#0d1117">
  <title>Doc Reader</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/styles/github.min.css" media="(prefers-color-scheme: light)">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/styles/github-dark.min.css" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ===== Экран подключения ===== -->
  <section id="setup" class="setup hidden">
    <form id="setupForm" class="setup-card" autocomplete="off">
      <h1>Doc Reader</h1>
      <p class="muted small">Подключи приватный репозиторий с .md файлами. Токен хранится только в этом браузере.</p>

      <label>GitHub владелец (логин / организация)
        <input name="owner" required placeholder="octocat" autocapitalize="off" autocorrect="off" spellcheck="false">
      </label>
      <label>Репозиторий
        <input name="repo" required placeholder="my-docs" autocapitalize="off" autocorrect="off" spellcheck="false">
      </label>
      <label>Ветка (необязательно)
        <input name="branch" placeholder="по умолчанию — главная ветка" autocapitalize="off" autocorrect="off" spellcheck="false">
      </label>
      <label>Папка внутри репо (необязательно)
        <input name="path" placeholder="напр. docs — пусто = весь репо" autocapitalize="off" autocorrect="off" spellcheck="false">
      </label>
      <label>Fine-grained token (Contents: Read-only)
        <input name="token" type="password" required placeholder="github_pat_…" autocapitalize="off" autocorrect="off" spellcheck="false">
      </label>

      <p id="setupError" class="error"></p>
      <button type="submit">Подключить</button>
      <p class="muted small">Токен: GitHub → Settings → Developer settings → Fine-grained tokens. Доступ — только нужный репозиторий, право <b>Contents = Read-only</b>.</p>
    </form>
  </section>

  <!-- ===== Ридер ===== -->
  <div id="reader" class="hidden">
    <header class="topbar">
      <button id="menuBtn" class="icon-btn" aria-label="Меню">☰</button>
      <h1 id="docTitle">Doc Reader</h1>
      <button id="fontDec" class="icon-btn font-btn" aria-label="Уменьшить текст" title="Уменьшить текст">A−</button>
      <button id="fontInc" class="icon-btn font-btn" aria-label="Увеличить текст" title="Увеличить текст">A+</button>
      <button id="settingsBtn" class="icon-btn" aria-label="Настройки">⚙</button>
    </header>
    <div class="layout">
      <aside id="sidebar" class="sidebar">
        <input id="filter" class="filter" type="search" placeholder="Поиск…" autocomplete="off">
        <nav id="fileList" class="file-list"></nav>
      </aside>
      <div id="backdrop" class="backdrop"></div>
      <main id="content" class="content markdown-body"><p class="muted">Загрузка…</p></main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/highlight.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
